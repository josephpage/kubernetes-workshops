# Secret contenant les mots de passe de la base — à créer AVANT la requête.
# Remplacez les valeurs REPLACE_ME (jamais de vrais secrets dans le dépôt).
#
# Contrainte Scaleway RDB : le mot de passe doit contenir majuscule, minuscule,
# chiffre et caractère spécial (sinon : `password does not respect constraint`
# sur la MR User, et par cascade `resource user ... is not found` sur Privilege).
apiVersion: v1
kind: Secret
metadata:
  name: database-passwords
  namespace: default
type: Opaque
stringData:
  admin-password: "REPLACE_ME_admin_1"
  user-password: "REPLACE_ME_user_1"
