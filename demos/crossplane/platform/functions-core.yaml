# Sous-ensemble statique de platform/functions.yaml.tpl : uniquement les 2 Functions
# communautaires, sans dépendance au registre individuel de la session. Utile pour
# les previews locales `crossplane render` de l'exercice 1 (Composition pure), qui
# n'utilise pas les functions custom ticket-gate / namespace-secret.
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-patch-and-transform
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-patch-and-transform:v0.10.7
---
apiVersion: pkg.crossplane.io/v1
kind: Function
metadata:
  name: function-auto-ready
spec:
  package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready:v0.7.0
